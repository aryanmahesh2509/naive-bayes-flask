<!DOCTYPE html>
<html>
<head>
<title>Naive Bayes Classifier</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:450px;
margin:auto;
box-shadow:0px 0px 10px gray;
}

input,textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Naive Bayes Classifier</h2>

<form method="POST" action="/predict">

<label>Training Data (rows separated by ;)</label><br>

<textarea name="X" placeholder="1,20;2,21;3,22;4,23"></textarea>

<br>

<label>Labels</label><br>

<input name="y" placeholder="0,0,1,1">

<br>

<label>Sample to Predict</label><br>

<input name="sample" placeholder="3,22">

<br>

<button type="submit">Predict</button>

</form>

{% if prediction is defined %}

<h3>Prediction: {{prediction}}</h3>

{% endif %}

</div>

</body>
</html>
